<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Familias — Proyecto OMEGA</title>
  <link rel="icon" type="image/svg+xml" href="/src/assets/icons/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/src/css/styles.css">
  <link rel="stylesheet" href="/src/css/dashboard.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand" href="/dashboard.html">
      <div class="sidebar-brand-icon">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">OMEGA</span>
        <span class="sidebar-brand-sub">Gestión de Adopciones</span>
      </div>
    </a>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>
      <a class="nav-item" href="/dashboard.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>Dashboard
      </a>
      <span class="nav-section-label">Gestión</span>
      <a class="nav-item" href="/menores.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0112 0v2"/>
        </svg>Menores
      </a>
      <a class="nav-item active" href="/familias.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>Familias
      </a>
      <a class="nav-item" href="/casos.html">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
        </svg>Casos
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar avatar-sm" id="sidebar-avatar">AD</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-username">Administrador</div>
          <div class="sidebar-user-role">Admin</div>
        </div>
        <button class="btn btn-icon" id="logout-btn" title="Cerrar sesión" style="color:rgba(255,255,255,.5);">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-area">
    <header class="app-header">
      <div class="header-left">
        <button class="menu-toggle" id="menu-toggle" aria-label="Menú">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <nav class="breadcrumb">
          <a class="breadcrumb-item" href="/dashboard.html">OMEGA</a>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-item current">Familias</span>
        </nav>
      </div>
      <div class="header-right">
        <div class="header-user">
          <div class="avatar avatar-sm" id="header-avatar">AD</div>
          <span class="header-user-name" id="header-username">Administrador</span>
        </div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-info">
          <h2>Familias</h2>
          <p>Registro y evaluación de familias solicitantes — <strong id="total-count">0</strong> registros</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-primary btn-sm" id="btn-nuevo">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Registrar familia
          </button>
        </div>
      </div>

      <div class="toolbar">
        <div class="search-wrap">
          <span class="icon">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input class="form-input search-input" id="search-input" type="search" placeholder="Buscar por apellido o contacto…">
        </div>
        <select class="form-select" id="filter-estado" style="width:auto;">
          <option value="">Todos los estados</option>
          <option value="pendiente">Pendiente</option>
          <option value="aprobada">Aprobada</option>
          <option value="rechazada">Rechazada</option>
        </select>
      </div>

      <div class="card" style="padding:0;overflow:hidden;">
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Apellido familiar</th>
                <th>Contacto</th>
                <th>Estado evaluación</th>
                <th>Fecha solicitud</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="familias-tbody">
              <tr><td colspan="5" style="text-align:center;padding:40px;">
                <div class="spinner" style="margin:0 auto;"></div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-familia">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Registrar familia</h3>
      <button class="modal-close" data-modal-close aria-label="Cerrar">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <form id="familia-form" novalidate>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="apellido">Apellido familiar *</label>
            <input class="form-input" id="apellido" name="apellido" type="text" placeholder="Ej. Rodríguez" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="estado_eval">Estado evaluación *</label>
            <select class="form-select" id="estado_eval" name="estado_eval" required>
              <option value="pendiente">Pendiente</option>
              <option value="aprobada">Aprobada</option>
              <option value="rechazada">Rechazada</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="contacto">Contacto (email o teléfono)</label>
          <input class="form-input" id="contacto" name="contacto" type="text" placeholder="email@ejemplo.com / +57 300 0000000">
        </div>
        <div class="form-group">
          <label class="form-label" for="fecha_solicitud">Fecha de solicitud</label>
          <input class="form-input" id="fecha_solicitud" name="fecha_solicitud" type="date">
        </div>
        <div class="form-group">
          <label class="form-label" for="notas">Notas internas</label>
          <textarea class="form-textarea" id="notas" name="notas" placeholder="Observaciones del proceso…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-modal-close>Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="/src/js/familias.js"></script>
<script type="module" src="/src/js/sw-register.js"></script>

</body>
</html>
