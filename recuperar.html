<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña — Proyecto OMEGA</title>
  <link rel="icon" type="image/svg+xml" href="/src/assets/icons/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/src/css/styles.css">
  <link rel="stylesheet" href="/src/css/auth.css">
</head>
<body>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-logo" data-org-logo>
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <h1 data-org>Proyecto OMEGA</h1>
      <p>Recuperar contraseña</p>
    </div>

    <form class="auth-form" id="recuperar-form" novalidate>
      <div id="auth-error" class="auth-error" role="alert"></div>
      <div id="auth-ok" class="auth-ok" role="status" style="display:none;"></div>

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="admin@ejemplo.com" autocomplete="email" required>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
        <span id="btn-text">Enviar enlace de recuperación</span>
        <span id="btn-spinner" style="display:none;" class="spinner"></span>
      </button>
    </form>

    <p class="auth-footer"><a href="/login.html">← Volver a iniciar sesión</a></p>
  </div>
</main>

<script type="module" src="/src/js/pages/recuperar.js"></script>

</body>
</html>
