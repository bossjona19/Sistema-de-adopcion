<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Proyecto OMEGA</title>
  <meta name="description" content="Sistema de Gestión de Adopciones">
  <link rel="icon" type="image/svg+xml" href="/src/assets/icons/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/src/css/styles.css">
  <link rel="stylesheet" href="/src/css/auth.css">
</head>
<body>

<main class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-logo">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <h1>Proyecto OMEGA</h1>
      <p>Sistema de Gestión de Adopciones</p>
    </div>

    <form class="auth-form" id="login-form" novalidate>
      <div id="auth-error" class="auth-error" role="alert"></div>

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="admin@ejemplo.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
        <span id="btn-text">Iniciar sesión</span>
        <span id="btn-spinner" style="display:none;" class="spinner" style="width:16px;height:16px;border-width:2px;"></span>
      </button>
    </form>

    <p class="auth-footer">Acceso restringido a administradores autorizados</p>
  </div>
</main>

<script type="module">
  import { signIn, redirectIfAuthenticated } from '/src/js/auth.js';
  import '/src/js/sw-register.js';

  // Redirect if already logged in
  await redirectIfAuthenticated();

  const form     = document.getElementById('login-form');
  const errorEl  = document.getElementById('auth-error');
  const btnText  = document.getElementById('btn-text');
  const spinner  = document.getElementById('btn-spinner');
  const submitBtn= document.getElementById('submit-btn');

  form.addEventListener('submit', async e => {
    e.preventDefault();
    errorEl.classList.remove('show');

    const email    = form.email.value.trim();
    const password = form.password.value;

    if (!email || !password) {
      errorEl.textContent = 'Por favor ingresa correo y contraseña.';
      errorEl.classList.add('show');
      return;
    }

    submitBtn.disabled = true;
    btnText.textContent = 'Verificando...';
    spinner.style.display = 'inline-block';

    try {
      await signIn(email, password);
      window.location.href = '/dashboard.html';
    } catch (err) {
      const msgs = {
        'Invalid login credentials': 'Correo o contraseña incorrectos.',
        'Email not confirmed':       'Debes confirmar tu correo antes de ingresar.',
      };
      errorEl.textContent = msgs[err.message] ?? 'Error al iniciar sesión. Intenta de nuevo.';
      errorEl.classList.add('show');
    } finally {
      submitBtn.disabled = false;
      btnText.textContent = 'Iniciar sesión';
      spinner.style.display = 'none';
    }
  });
</script>

</body>
</html>
