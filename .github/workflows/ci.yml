name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validar y probar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Chequeo de sintaxis (todos los .js)
        run: |
          set -e
          find src -name '*.js' -print0 | xargs -0 -n1 -P4 node --check
          node --check sw.js

      - name: Pruebas unitarias
        run: node --test
